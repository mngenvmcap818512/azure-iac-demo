# On pull request events, this workflow will run `terraform init`, `terraform fmt`, and `terraform plan`. 
# On push events to the "main" branch, `terraform apply` will also be executed.

name: 'Deploy resources with Terraform'

on:
  push:
    branches: [ "main" ]
  pull_request:


permissions:
  id-token: write
  contents: read

env:
  IS_PULL_REQUEST: "${{ github.event_name == 'pull_request' }}"

jobs:
  terraform:
    name: 'Deploy'
    runs-on: ubuntu-latest

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_1_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Log into Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_1_ID }}
        enable-AzPSSession: true

    # Install the latest version of Terraform CLI
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      
    - name: Find Terraform directories
      id: find-dirs
      run: |
        dirs=$(find . -name "*.tf" -type f | xargs dirname | sort -u | tr '\n' ',')
        echo "dirs=${dirs%,}" >> $GITHUB_OUTPUT
    
    - name: Run Terraform for each directory
      run: |
        IFS=',' read -ra dirs <<< "${{ steps.find-dirs.outputs.dirs }}"
        for dir in "${dirs[@]}"; do
          echo "========================================"
          echo "Processing Terraform directory: $dir"
          echo "========================================"
          cd "$dir"
          
          echo "Running terraform init..."
          terraform init
          
          echo "Running terraform plan..."
          terraform plan -out=tfplan
          
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Running terraform apply..."
            terraform apply -auto-approve tfplan
          fi
          
          cd -
        done
